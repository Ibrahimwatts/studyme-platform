<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up - Studyme</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
</head>
<body class="landing">

  <header class="landing-header">
    <div class="logo">
      <h1>Studyme</h1>
      <p>Digital Learning Platform for KCSE Success</p>
    </div>
  </header>

  <main class="landing-hero">
    <div class="hero-content auth-form-container">
      <h1 class="hero-title">Join Studyme</h1>
      <p class="hero-subtitle">
        Create your free account and start mastering KCSE subjects today.
      </p>

      <div class="auth-form">
        <!-- Role selection – placed right above the signup button -->
        <div class="role-selection">
          <p class="role-label">I am a:</p>
          <div class="role-options">
            <label class="role-label-item">
              <input type="radio" name="role" value="student" checked required />
              Student
            </label>
            <label class="role-label-item">
              <input type="radio" name="role" value="teacher" />
              Teacher
            </label>
          </div>
        </div>

        <button id="google-signup-btn" class="btn-landing btn-login full-width">
          Sign Up with Google
        </button>

        <div class="auth-links">
          <a href="login.html" class="auth-link">Already have an account? Log In</a>
        </div>

        <p id="error-message" class="error-message"></p>
        <p id="success-message" class="success-message hidden"></p>
      </div>
    </div>
  </main>

  <footer class="landing-footer">
    © 2026 Studyme. All rights reserved.
  </footer>

  <script src="script.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const googleBtn = document.getElementById('google-signup-btn');
      const errorMsg = document.getElementById('error-message');
      const successMsg = document.getElementById('success-message');

      googleBtn.addEventListener('click', async () => {
        errorMsg.textContent = '';
        successMsg.classList.add('hidden');

        // Get selected role
        const selectedRole = document.querySelector('input[name="role"]:checked')?.value;
        if (!selectedRole) {
          errorMsg.textContent = 'Please select whether you are a Student or Teacher.';
          return;
        }

        try {
          // Store role temporarily (will be saved after auth)
          localStorage.setItem('pendingRole', selectedRole);

          const { error } = await window.supabaseClient.auth.signInWithOAuth({
            provider: 'google',
            options: {
              redirectTo: window.location.origin + '/signup.html'
            }
          });

          if (error) throw error;
        } catch (err) {
          errorMsg.textContent = err.message || 'Signup failed. Please try again.';
        }
      });

      // Handle post-signup role saving
      window.supabaseClient.auth.onAuthStateChange(async (event, session) => {
        if (event === 'SIGNED_IN') {
          const pendingRole = localStorage.getItem('pendingRole');

          if (pendingRole) {
            const { data: { user } } = await window.supabaseClient.auth.getUser();

            if (user && !user.user_metadata?.role) {
              const { error } = await window.supabaseClient.auth.updateUser({
                data: { role: pendingRole }
              });

              if (error) {
                errorMsg.textContent = 'Failed to save role: ' + error.message;
              } else {
                localStorage.removeItem('pendingRole');
                successMsg.textContent = 'Account created! Redirecting...';
                successMsg.classList.remove('hidden');
                setTimeout(() => {
                  window.location.href = '/home.html';
                }, 1500);
              }
            } else {
              localStorage.removeItem('pendingRole');
              window.location.href = '/home.html';
            }
          } else {
            window.location.href = '/home.html';
          }
        }
      });
    });
  </script>
</body>
</html>
