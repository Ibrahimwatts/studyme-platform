<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up - Studyme</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
</head>
<body class="landing">

  <header class="landing-header">
    <div class="logo">
      <h1>Studyme</h1>
      <p>Digital Learning Platform for KCSE Success</p>
    </div>
  </header>

  <main class="landing-hero">
    <div class="hero-content auth-form-container">
      <h1 class="hero-title">Join Studyme</h1>
      <p class="hero-subtitle">
        Create your free account and start mastering KCSE subjects today.
      </p>

      <div class="auth-form">
        <button id="google-signup-btn" class="btn-landing btn-login full-width">
          Sign Up with Google
        </button>

        <div class="auth-links">
          <a href="login.html" class="auth-link">Already have an account? Log In</a>
        </div>

        <p id="error-message" class="error-message"></p>
        <p id="success-message" class="success-message hidden"></p>
      </div>
    </div>
  </main>

  <footer class="landing-footer">
    © 2026 Studyme. All rights reserved.
  </footer>

  <!-- Role Selection Modal -->
  <div id="role-modal" class="role-modal hidden">
    <div class="role-modal-content">
      <h2 class="role-modal-title">Who Are You?</h2>
      <p class="role-modal-subtitle">Select your role to get the right experience</p>

      <div class="role-options">
        <button id="role-student-btn" class="role-btn student">
          <span class="role-icon">🎓</span>
          <span>Student</span>
          <small>Access notes, videos, tests & community</small>
        </button>

        <button id="role-teacher-btn" class="role-btn teacher">
          <span class="role-icon">👨‍🏫</span>
          <span>Teacher / Admin</span>
          <small>Manage content, classes & student progress</small>
        </button>
      </div>

      <p id="role-error" class="role-error hidden"></p>
    </div>
  </div>

  <script src="script.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const googleBtn = document.getElementById('google-signup-btn');
      const errorMsg = document.getElementById('error-message');
      const roleModal = document.getElementById('role-modal');
      const roleStudentBtn = document.getElementById('role-student-btn');
      const roleTeacherBtn = document.getElementById('role-teacher-btn');
      const roleError = document.getElementById('role-error');

      googleBtn.addEventListener('click', async () => {
        errorMsg.textContent = '';
        try {
          const { error } = await window.supabaseClient.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: window.location.origin + '/signup.html' } // Stay on signup for role prompt
          });
          if (error) throw error;
        } catch (err) {
          errorMsg.textContent = 'Google signup failed: ' + (err.message || 'Try again');
        }
      });

      // Listen for auth state → show role modal if new user
      window.supabaseClient.auth.onAuthStateChange(async (event, session) => {
        if (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') {
          const { data: { user } } = await window.supabaseClient.auth.getUser();

          if (user && !user.user_metadata?.role) {
            roleModal.classList.remove('hidden');
          } else {
            window.location.href = '/home.html';
          }
        }
      });

      // Save role when clicked
      async function saveRole(role) {
        try {
          const { error } = await window.supabaseClient.auth.updateUser({
            data: { role }
          });

          if (error) throw error;

          roleModal.classList.add('hidden');
          window.location.href = '/home.html';
        } catch (err) {
          roleError.textContent = 'Failed to save role: ' + err.message;
          roleError.classList.remove('hidden');
        }
      }

      roleStudentBtn.addEventListener('click', () => saveRole('student'));
      roleTeacherBtn.addEventListener('click', () => saveRole('teacher'));
    });
  </script>
</body>
</html>
