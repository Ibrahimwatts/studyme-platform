<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revision Notes - Studyme</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Ensure library is in the HEAD -->
  <script src="https://unpkg.com"></script>
</head>
<body>

  <header>
    <div class="header-container">
      <div class="logo">
        <h1>Studyme</h1>
        <span>Digital Learning Platform</span>
      </div>
      <div class="search-bar">
        <input type="search" placeholder="Search notes, videos, tests...">
        <button type="submit">Search</button>
      </div>
      <nav>
        <ul class="nav-menu">
          <li><a href="index.html">Home</a></li>
          <li><a href="notes.html">Revision Notes</a></li>
          <li><a href="#" class="login-btn">Log In</a></li>
          <li><a href="#" class="logout-btn">Log Out</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <div class="notes-layout">
      <aside class="notes-sidebar">
        <h3>Subjects</h3>
        <ul class="subject-list" id="subject-list">
          <li><a href="#" data-subject="Physics" class="active">Physics</a></li>
          <li><a href="#" data-subject="Chemistry">Chemistry</a></li>
          <li><a href="#" data-subject="Biology">Biology</a></li>
          <li><a href="#" data-subject="Mathematics">Mathematics</a></li>
        </ul>
      </aside>

      <section class="notes-content" id="notes-container">
        <h2>Loading Revision Notes...</h2>
      </section>
    </div>
  </main>

  <script src="script.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const container = document.getElementById('notes-container');
      
      // FIX: Wait for window.supabase to be fully initialized by script.js
      let attempts = 0;
      while ((!window.supabase || !window.supabase.from) && attempts < 10) {
        await new Promise(r => setTimeout(r, 200));
        attempts++;
      }

      if (!window.supabase || !window.supabase.from) {
        container.innerHTML = '<p style="color:red">Failed to connect to backend. Please refresh.</p>';
        return;
      }

      const subjectLinks = document.querySelectorAll('#subject-list a');
      const urlParams = new URLSearchParams(window.location.search);
      let currentSubject = urlParams.get('subject') || 'Physics';

      async function loadNotes(subject) {
        container.innerHTML = '<p>Loading...</p>';
        try {
          const { data, error } = await window.supabase
            .from('revision_notes')
            .select('*')
            .ilike('subject', `%${subject}%`)
            .order('created_at', { ascending: false });

          if (error) throw error;

          container.innerHTML = data.length ? '' : `<p>No notes found for ${subject}.</p>`;
          data.forEach(note => {
            const card = document.createElement('div');
            card.className = 'content-card';
            card.innerHTML = `
              <h3>${note.title}</h3>
              <p>${note.subject} • ${note.form}</p>
              <div class="note-body">${note.body ? note.body.substring(0, 200) + '...' : ''}</div>
              <a href="#" class="btn small">Read Full Note</a>
            `;
            container.appendChild(card);
          });
        } catch (err) {
          container.innerHTML = '<p>Error loading notes. Check RLS policies.</p>';
        }
      }

      loadNotes(currentSubject);

      subjectLinks.forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const subject = link.dataset.subject;
          subjectLinks.forEach(l => l.classList.remove('active'));
          link.classList.add('active');
          loadNotes(subject);
        });
      });
    });
  </script>
</body>
</html>
