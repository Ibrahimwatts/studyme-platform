<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In - Studyme</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
</head>
<body class="landing">

  <header class="landing-header">
    <div class="logo">
      <h1>Studyme</h1>
      <p>Digital Learning Platform for KCSE Success</p>
    </div>
  </header>

  <main class="landing-hero">
    <div class="hero-content auth-form-container">
      <h1 class="hero-title">Welcome Back</h1>
      <p class="hero-subtitle">
        Log in to access your personalized dashboard, revision notes, videos, tests, and more.
      </p>

      <div class="auth-form">
        <button id="google-login-btn" class="btn-landing btn-login full-width">
          Log In with Google
        </button>

        <div class="auth-links">
          <a href="signup.html" class="auth-link">Don't have an account? Sign Up</a>
        </div>

        <p id="error-message" class="error-message"></p>
      </div>
    </div>
  </main>

  <footer class="landing-footer">
    © 2026 Studyme. All rights reserved.
  </footer>

  <script src="script.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const googleBtn = document.getElementById('google-login-btn');
      const errorMsg = document.getElementById('error-message');

      googleBtn.addEventListener('click', async () => {
        errorMsg.textContent = 'Connecting to Google...';
        errorMsg.style.color = '#ccc';

        try {
          const { error } = await window.supabaseClient.auth.signInWithOAuth({
            provider: 'google',
            options: {
              redirectTo: window.location.origin + '/home.html'
            }
          });

          if (error) throw error;
        } catch (err) {
          let msg = err.message || 'Login failed. Please try again.';

          // Friendly message for non-existent users
          if (msg.includes('not found') || msg.includes('invalid') || msg.includes('credentials')) {
            msg = 'Account not found. Please <a href="signup.html" style="color:#4ade80; text-decoration:underline;">sign up first</a>.';
          }

          errorMsg.innerHTML = msg;
          errorMsg.style.color = '#ff6b6b';
        }
      });
    });
  </script>
</body>
</html>
