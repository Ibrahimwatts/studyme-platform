<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In - Studyme</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- FIXED: This line was missing – Supabase library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
</head>
<body class="landing">

  <header class="landing-header">
    <div class="logo">
      <h1>Studyme</h1>
      <p>Digital Learning Platform for KCSE Success</p>
    </div>
  </header>

  <main class="landing-hero">
    <div class="hero-content auth-form-container">
      <h1 class="hero-title">Welcome Back</h1>
      <p class="hero-subtitle">
        Log in to access your personalized dashboard, revision notes, videos, tests, and more.
      </p>

      <div class="auth-form">
        <button id="google-login-btn" class="btn-landing btn-login full-width">
          Log In with Google
        </button>

        <div class="auth-links">
          <a href="signup.html" class="auth-link">Don't have an account? Sign Up</a>
        </div>

        <p id="error-message" class="error-message"></p>
      </div>
    </div>
  </main>

  <footer class="landing-footer">
    © 2026 Studyme. All rights reserved.
  </footer>

  <script src="script.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const googleBtn = document.getElementById('google-login-btn');
      const errorMsg = document.getElementById('error-message');

      if (!window.supabase) {
        errorMsg.textContent = 'Supabase library failed to load. Please refresh or check your internet.';
        console.error('Supabase not available');
        return;
      }

      googleBtn.addEventListener('click', async () => {
        errorMsg.textContent = '';
        try {
          await loginWithGoogle(); // From script.js
        } catch (err) {
          errorMsg.textContent = 'Google login failed: ' + (err.message || 'Unknown error');
        }
      });
    });
  </script>
</body>
</html>
